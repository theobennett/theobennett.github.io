<!DOCTYPE html>
<html lang="en">
<!-- Copy the standard header from index.html -->
<body>
    <!-- Header -->

    <main>
        <header class="page-header">
            <div class="container">
                <h1>Request a Free Consultation</h1>
            </div>
        </header>

        <section class="content-section">
            <div class="container">
                <div class="form-container">
                    <p>Please fill out the information below to request your free 15-minute initial consultation. Our care coordinator will contact you within one business day to schedule. All your information is kept strictly confidential.</p>
                    
                    <!-- 
                        ACTION: Replace "YOUR_EMAIL_HERE" with your actual email address.
                        You will need to sign up for a free Formspree account and use your unique URL.
                    -->
                    <form action="https://formspree.io/f/YOUR_UNIQUE_FORM_ID" method="POST">
                        <div class="form-group">
                            <label for="first-name">First Name</label>
                            <input type="text" id="first-name" name="firstName" required>
                        </div>
                        <div class="form-group">
                            <label for="last-name">Last Name</label>
                            <input type="text" id="last-name" name="lastName" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        <div class="form-group">
                            <label for="phone">Phone Number</label>
                            <input type="tel" id="phone" name="phone">
                        </div>
                        <div class="form-group">
                            <label for="dob">Date of Birth</label>
                            <input type="date" id="dob" name="dob" required>
                        </div>
                        <div class="form-group">
                            <label for="reason">What brings you here today? (Optional)</label>
                            <textarea id="reason" name="reason" rows="4"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 1.2rem;">Submit Request</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <!-- Copy the standard footer from index.html -->
</body>
</html>
